apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: keycloak
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/my-cluster/apps/keycloak
  prune: true
  dependsOn:
    - name: keycloak-operator
    - name: postgres
  sourceRef:
    kind: GitRepository
    name: platform-config
  wait: true
